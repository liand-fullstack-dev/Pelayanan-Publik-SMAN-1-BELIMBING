name: Deploy Supabase

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Database & Edge Functions
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login to Supabase
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase Project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy appointments
          supabase functions deploy stats
          supabase functions deploy admin-auth

      - name: Deployment Complete
        run: echo "✅ Supabase deployment completed successfully!"
